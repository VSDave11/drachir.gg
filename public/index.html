<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yggdrasil.gg - Enter the Hall</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="main-wrapper">
        <header>
            <h1 class="logo-text">Yggdrasil.gg</h1>
            <p class="subtitle">Team calendar for modern warriors</p>
        </header>

        <main>
            <div class="login-box">
                <h2>Login</h2>
                <form action="/login" method="POST">
                    <div class="input-group">
                        <input type="email" name="email" placeholder="Your warrior email" required>
                    </div>
                    <div class="input-group">
                        <input type="password" name="password" placeholder="Secret password" required>
                    </div>
                    
                    <div class="remember-me-group">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">Remember me</label>
                    </div>

                    <button type="submit">Enter the Hall</button>
                </form>
                <div class="footer-links">
                    <a href="#">Forgot password?</a>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
